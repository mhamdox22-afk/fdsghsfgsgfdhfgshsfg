# yaml-language-server: $schema=https://raw.githubusercontent.com/codemagic-ci-cd/codemagic-docs/main/schema/codemagic_schema.json
workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_PROJECT: "App.xcodeproj"
        BUNDLE_ID: "com.echoh5.app"
        SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build Vue project
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          # Code signing setup will be handled in Codemagic UI
      - name: Create exportOptions.plist
        script: |
          cd ios
          mkdir -p build
          cat > build/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>enterprise</string>
            <key>teamID</key>
            <string>(TEAM_ID)</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          EOF
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace "App.xcworkspace" -scheme "App" -configuration Release -sdk iphoneos -archivePath "../build/App.xcarchive" archive
      - name: Export IPA
        script: |
          cd ios
          xcodebuild -exportArchive -archivePath "build/App.xcarchive" -exportPath "build/ipa" -exportOptionsPlist "build/exportOptions.plist"
    artifacts:
      - ios/build/ipa/*.ipa
    publishing:
      email:
        recipients:
          - mhamdox22@gmail.com