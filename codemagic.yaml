# yaml-language-server: $schema=https://raw.githubusercontent.com/codemagic-ci-cd/codemagic-docs/main/schema/codemagic_schema.json
workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_PROJECT: "App.xcodeproj"
        BUNDLE_ID: "com.echoh5.app"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build Vue project
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          # Code signing setup will be handled in Codemagic UI
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - mhamdox22@gmail.com