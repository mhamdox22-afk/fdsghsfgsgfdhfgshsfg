# yaml-language-server: $schema=https://raw.githubusercontent.com/codemagic-ci-cd/codemagic-docs/main/schema/codemagic_schema.json
workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_PROJECT: "App.xcodeproj"
        BUNDLE_ID: "com.echoh5.app"
        SCHEME: "App"
        CERTIFICATE_PATH: "ios/certificates/证书文件.p12"
        CERTIFICATE_PASSWORD: "kabao"
        PROVISIONING_PROFILE_PATH: "ios/provisioning/描述文件.mobileprovision"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build Vue project
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          # Create directories for certificates and provisioning profiles
          mkdir -p ios/certificates ios/provisioning
          
          # Copy certificate and provisioning profile
          cp "${HOME}/certificate.p12" "ios/certificates/证书文件.p12"
          cp "${HOME}/provisioning.mobileprovision" "ios/provisioning/描述文件.mobileprovision"
          
          # Install certificate
          security create-keychain -p "temp" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp" build.keychain
          security import "${CERTIFICATE_PATH}" -k build.keychain -P "${CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp" build.keychain
          
          # Install provisioning profile
          PROFILE_UUID=$(security cms -D -i "${PROVISIONING_PROFILE_PATH}" | grep -A 1 UUID | grep -o "[A-F0-9-]\{36\}")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "${PROVISIONING_PROFILE_PATH}" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
      - name: Create exportOptions.plist
        script: |
          cd ios
          mkdir -p build
          cat > build/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>enterprise</string>
            <key>teamID</key>
            <string>(TEAM_ID)</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          EOF
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace "App.xcworkspace" -scheme "App" -configuration Release -sdk iphoneos -archivePath "../build/App.xcarchive" archive
      - name: Export IPA
        script: |
          cd ios
          xcodebuild -exportArchive -archivePath "build/App.xcarchive" -exportPath "build/ipa" -exportOptionsPlist "build/exportOptions.plist"
    artifacts:
      - ios/build/ipa/*.ipa
    publishing:
      email:
        recipients:
          - mhamdox22@gmail.com
        notify_on_build_failure: true
        notify_on_build_success: true