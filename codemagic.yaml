# yaml-language-server: $schema=https://raw.githubusercontent.com/codemagic-ci-cd/codemagic-docs/main/schema/codemagic_schema.json
workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_PROJECT: "App.xcodeproj"
        BUNDLE_ID: "xyz.appinstall.nov.carbon.lam"
        SCHEME: "App"
        CERTIFICATE_PATH: "ios/certificates/证书文件.p12"
        CERTIFICATE_PASSWORD: "kabao"
        PROVISIONING_PROFILE_PATH: "ios/provisioning/描述文件.mobileprovision"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build Vue project
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing
        script: |
          # Create directories for certificates and provisioning profiles
          mkdir -p ios/certificates ios/provisioning
          
          # Check if files exist in project directory
          if [ -f "ios/certificates/证书文件.p12" ]; then
            echo "Found certificate file in project directory"
          else
            echo "Certificate file not found, please make sure it's uploaded to Codemagic"
            exit 1
          fi
          
          if [ -f "ios/provisioning/描述文件.mobileprovision" ]; then
            echo "Found provisioning profile in project directory"
          else
            echo "Provisioning profile not found, please make sure it's uploaded to Codemagic"
            exit 1
          fi
          
          # Install certificate
          security create-keychain -p "temp" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp" build.keychain
          security import "${CERTIFICATE_PATH}" -k build.keychain -P "${CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp" build.keychain
          
          # Install provisioning profile with explicit UUID
          PROFILE_UUID="0431aa23-e782-4273-ab04-109cc091608f"
          echo "Using provisioning profile UUID: ${PROFILE_UUID}"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "${PROVISIONING_PROFILE_PATH}" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          
          # List installed provisioning profiles
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Verify the provisioning profile
          security cms -D -i "${PROVISIONING_PROFILE_PATH}" | grep -A 5 "TeamIdentifier" || true
          security cms -D -i "${PROVISIONING_PROFILE_PATH}" | grep -A 5 "UUID" || true
      - name: Create exportOptions.plist
        script: |
          cd ios
          mkdir -p build
          cat > build/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>enterprise</string>
            <key>teamID</key>
            <string>ZDV8SQG3XZ</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>xyz.appinstall.nov.carbon.lam</key>
              <string>0431aa23-e782-4273-ab04-109cc091608f</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          EOF
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace "App.xcworkspace" -scheme "App" -configuration Release -sdk iphoneos -archivePath "../build/App.xcarchive" archive
      - name: Export IPA
        script: |
          cd ios
          xcodebuild -exportArchive -archivePath "build/App.xcarchive" -exportPath "build/ipa" -exportOptionsPlist "build/exportOptions.plist"
    artifacts:
      - ios/build/ipa/*.ipa
    publishing:
      email:
        recipients:
          - mhamdox22@gmail.com
        notify:
          success: true
          failure: true